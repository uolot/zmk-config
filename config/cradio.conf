CONFIG_ZMK_SLEEP=y
# 2h * 60m * 60s * 1000ms = 7200000ms
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000
# 30m * 60s * 1000ms = 1800000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

CONFIG_ZMK_POINTING=y

# Unicode timing for zmk-unicode.
# Defaults are 5ms tap / 0ms wait; these slightly slower values help avoid
# mangled sequences over Bluetooth or in slower apps.
# TODO: update if needed:
# CONFIG_ZMK_UNICODE_TAP_MS=20
# CONFIG_ZMK_UNICODE_WAIT_MS=20
CONFIG_ZMK_UNICODE_TAP_MS=10
CONFIG_ZMK_UNICODE_WAIT_MS=10
